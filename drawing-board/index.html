<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drawing Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: #12121a;
    border-bottom: 1px solid #1e1e2e;
    flex-wrap: wrap;
    z-index: 10;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toolbar-divider {
    width: 1px;
    height: 28px;
    background: #1e1e2e;
  }

  .tool-btn {
    width: 36px;
    height: 36px;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    background: #0a0a0f;
    color: #999;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .tool-btn:hover { border-color: #2a2a3a; color: #fff; }
  .tool-btn.active { border-color: #5b5bf0; color: #fff; background: #1a1a2e; }

  .color-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .color-btn:hover { transform: scale(1.15); }
  .color-btn.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }

  input[type="color"] {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    background: none;
    padding: 0;
  }

  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: 2px solid #333; border-radius: 50%; }

  .size-slider {
    width: 80px;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #1e1e2e;
    outline: none;
  }

  .size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #5b5bf0;
    cursor: pointer;
  }

  .size-label {
    font-size: 12px;
    color: #555;
    min-width: 32px;
    text-align: center;
  }

  .action-btn {
    padding: 6px 14px;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    background: #0a0a0f;
    color: #999;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.2s;
  }

  .action-btn:hover { border-color: #2a2a3a; color: #fff; }
  .action-btn.danger:hover { border-color: #f05b5b; color: #f05b5b; }

  .spacer { flex: 1; }

  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .cursor-preview {
    position: fixed;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.5);
    pointer-events: none;
    z-index: 100;
    display: none;
  }

  @media (max-width: 640px) {
    .toolbar { padding: 8px 12px; gap: 8px; }
    .size-slider { width: 60px; }
    .hide-mobile { display: none; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-group">
    <button class="tool-btn active" data-tool="brush" title="Brush">&#9998;</button>
    <button class="tool-btn" data-tool="eraser" title="Eraser">&#9003;</button>
    <button class="tool-btn" data-tool="line" title="Line">&#9585;</button>
    <button class="tool-btn" data-tool="rect" title="Rectangle">&#9633;</button>
    <button class="tool-btn" data-tool="circle" title="Circle">&#9675;</button>
    <button class="tool-btn" data-tool="fill" title="Fill Bucket">&#9781;</button>
  </div>

  <div class="toolbar-divider"></div>

  <div class="toolbar-group">
    <button class="color-btn active" data-color="#ffffff" style="background:#ffffff;" title="White"></button>
    <button class="color-btn" data-color="#f05b5b" style="background:#f05b5b;" title="Red"></button>
    <button class="color-btn" data-color="#5bf08a" style="background:#5bf08a;" title="Green"></button>
    <button class="color-btn" data-color="#5b8ef0" style="background:#5b8ef0;" title="Blue"></button>
    <button class="color-btn" data-color="#f0d85b" style="background:#f0d85b;" title="Yellow"></button>
    <button class="color-btn" data-color="#d15bf0" style="background:#d15bf0;" title="Purple"></button>
    <input type="color" id="customColor" value="#ff8800" title="Custom color">
  </div>

  <div class="toolbar-divider"></div>

  <div class="toolbar-group">
    <span class="size-label" id="sizeLabel">4px</span>
    <input type="range" class="size-slider" id="brushSize" min="1" max="80" value="4">
  </div>

  <div class="spacer"></div>

  <div class="toolbar-group">
    <button class="action-btn" id="undoBtn" title="Undo">Undo</button>
    <button class="action-btn" id="redoBtn" title="Redo">Redo</button>
    <button class="action-btn hide-mobile" id="saveBtn" title="Save as PNG">Save</button>
    <button class="action-btn danger" id="clearBtn" title="Clear canvas">Clear</button>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="canvas"></canvas>
</div>
<div class="cursor-preview" id="cursorPreview"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const cursorPreview = document.getElementById('cursorPreview');

let tool = 'brush';
let color = '#ffffff';
let brushSize = 4;
let drawing = false;
let lastX, lastY;
let startX, startY;
let history = [];
let historyIndex = -1;
let shapeSnapshot = null;

function resize() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  const tmp = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = w;
  canvas.height = h;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, w, h);
  ctx.putImageData(tmp, 0, 0);
}

function init() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
}

function saveState() {
  historyIndex++;
  history = history.slice(0, historyIndex);
  history.push(canvas.toDataURL());
  if (history.length > 50) {
    history.shift();
    historyIndex--;
  }
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    restoreState();
  }
}

function redo() {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    restoreState();
  }
}

function restoreState() {
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
  };
  img.src = history[historyIndex];
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  const pos = getPos(e);
  lastX = pos.x;
  lastY = pos.y;
  startX = pos.x;
  startY = pos.y;

  if (tool === 'fill') {
    floodFill(Math.round(pos.x), Math.round(pos.y), color);
    saveState();
    drawing = false;
    return;
  }

  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    shapeSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }

  if (tool === 'brush' || tool === 'eraser') {
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, brushSize / 2, 0, Math.PI * 2);
    ctx.fillStyle = tool === 'eraser' ? '#0a0a0f' : color;
    ctx.fill();
  }
}

function draw(e) {
  if (!drawing) return;
  e.preventDefault();
  const pos = getPos(e);

  if (tool === 'brush' || tool === 'eraser') {
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = tool === 'eraser' ? '#0a0a0f' : color;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    lastX = pos.x;
    lastY = pos.y;
  } else if (tool === 'line') {
    ctx.putImageData(shapeSnapshot, 0, 0);
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(pos.x, pos.y);
    ctx.strokeStyle = color;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.stroke();
  } else if (tool === 'rect') {
    ctx.putImageData(shapeSnapshot, 0, 0);
    ctx.beginPath();
    ctx.rect(startX, startY, pos.x - startX, pos.y - startY);
    ctx.strokeStyle = color;
    ctx.lineWidth = brushSize;
    ctx.stroke();
  } else if (tool === 'circle') {
    ctx.putImageData(shapeSnapshot, 0, 0);
    const rx = Math.abs(pos.x - startX) / 2;
    const ry = Math.abs(pos.y - startY) / 2;
    const cx = startX + (pos.x - startX) / 2;
    const cy = startY + (pos.y - startY) / 2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.strokeStyle = color;
    ctx.lineWidth = brushSize;
    ctx.stroke();
  }
}

function endDraw(e) {
  if (!drawing) return;
  drawing = false;
  shapeSnapshot = null;
  saveState();
}

function floodFill(sx, sy, fillColor) {
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  const w = canvas.width;
  const h = canvas.height;

  const idx = (sy * w + sx) * 4;
  const tr = data[idx], tg = data[idx+1], tb = data[idx+2], ta = data[idx+3];

  const fc = hexToRgb(fillColor);
  if (tr === fc.r && tg === fc.g && tb === fc.b) return;

  const stack = [[sx, sy]];
  const visited = new Uint8Array(w * h);

  while (stack.length) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= w || y < 0 || y >= h) continue;
    const pi = y * w + x;
    if (visited[pi]) continue;

    const i = pi * 4;
    if (Math.abs(data[i] - tr) > 30 || Math.abs(data[i+1] - tg) > 30 ||
        Math.abs(data[i+2] - tb) > 30 || Math.abs(data[i+3] - ta) > 30) continue;

    visited[pi] = 1;
    data[i] = fc.r; data[i+1] = fc.g; data[i+2] = fc.b; data[i+3] = 255;

    stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
  }

  ctx.putImageData(imageData, 0, 0);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return { r, g, b };
}

// Tool buttons
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tool = btn.dataset.tool;
    wrap.style.cursor = tool === 'fill' ? 'cell' : 'crosshair';
  });
});

// Color buttons
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    color = btn.dataset.color;
    document.getElementById('customColor').value = color;
  });
});

document.getElementById('customColor').addEventListener('input', (e) => {
  color = e.target.value;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
});

// Brush size
const sizeSlider = document.getElementById('brushSize');
const sizeLabel = document.getElementById('sizeLabel');
sizeSlider.addEventListener('input', () => {
  brushSize = parseInt(sizeSlider.value);
  sizeLabel.textContent = brushSize + 'px';
});

// Cursor preview
document.addEventListener('mousemove', (e) => {
  if (tool === 'fill') { cursorPreview.style.display = 'none'; return; }
  cursorPreview.style.display = 'block';
  const s = brushSize;
  cursorPreview.style.width = s + 'px';
  cursorPreview.style.height = s + 'px';
  cursorPreview.style.left = (e.clientX - s/2) + 'px';
  cursorPreview.style.top = (e.clientY - s/2) + 'px';
});

wrap.addEventListener('mouseleave', () => { cursorPreview.style.display = 'none'; });

// Actions
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);
document.getElementById('clearBtn').addEventListener('click', () => {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
});
document.getElementById('saveBtn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'drawing.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
});

// Canvas events
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);

canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', endDraw);

window.addEventListener('resize', resize);
init();
</script>
</body>
</html>
